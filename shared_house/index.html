    <script>
        let globalData = { photos: [], websites: [], messages: [] };
        let fileSha = null;

        async function loadCloudData() {
            try {
                const res = await fetch("/shared_data.json");
                if (res.ok) {
                    const data = await res.json();
                    globalData = data.data || { photos: [], websites: [], messages: [] };
                    fileSha = data.sha || null;
                }
            } catch (e) {}
            renderAll();
        }

        async function saveCloudData() {
            const user = netlifyIdentity.currentUser();
            if (!user) { alert("请先登录"); return; }

            const dataToSave = { data: globalData, sha: fileSha };
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(dataToSave, null, 2))));

            const body = { message: "更新共享数据", content: content };
            if (fileSha) body.sha = fileSha;

            const res = await fetch("/.netlify/git/github/contents/shared_data.json", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            if (res.ok) {
                const result = await res.json();
                fileSha = result.content.sha;
                alert("已同步到所有设备！");
            }
        }

        function renderAll() {
            renderPhotos();
        }

        // 初始化
        netlifyIdentity.init();
        document.addEventListener('DOMContentLoaded', () => {
            AOS.init();
            loadCloudData();

            document.getElementById('login-btn').onclick = () => netlifyIdentity.open();
            document.getElementById('logout-btn').onclick = () => {
                netlifyIdentity.logout();
                document.getElementById('success-page').classList.add('hidden');
                document.getElementById('welcome-page').classList.remove('hidden');
            };

            netlifyIdentity.on('login', () => {
                document.getElementById('welcome-page').classList.add('hidden');
                document.getElementById('success-page').classList.remove('hidden');
                loadCloudData();
            });

            // 相册渲染
            window.renderPhotos = function() {
                const grid = document.querySelector('#album .grid');
                grid.innerHTML = '';
                const photos = globalData.photos.slice(0,4);
                photos.forEach((p,i) => {
                    const el = document.createElement('div');
                    el.className = 'relative bg-white/10 backdrop-blur-sm rounded-lg overflow-hidden aspect-square';
                    el.innerHTML = `<img src="${p}" class="w-full h-full object-contain">
                        <div class="absolute inset-0 bg-black/0 hover:bg-black/30 flex items-center justify-center opacity-0 hover:opacity-100">
                            <button class="del-photo text-white bg-red-500/80 px-3 py-1 rounded-full mr-2">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>`;
                    el.querySelector('.del-photo').onclick = async () => {
                        globalData.photos.splice(i,1);
                        await saveCloudData();
                        renderPhotos();
                    };
                    grid.appendChild(el);
                });

                const add = document.createElement('div');
                add.className = 'bg-white/20 backdrop-blur-sm rounded-lg flex items-center justify-center aspect-square cursor-pointer text-white';
                add.innerHTML = '<i class="fa fa-plus text-4xl"></i>';
                add.onclick = () => {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = (e) => {
                        const f = e.target.files[0];
                        if (f) {
                            const r = new FileReader();
                            r.onload = async () => {
                                globalData.photos.push(r.result);
                                await saveCloudData();
                                renderPhotos();
                            };
                            r.readAsDataURL(f);
                        }
                    };
                    input.click();
                };
                grid.appendChild(add);
            };

            // 网站存储
            document.getElementById('website-storage').onclick = () => {
                const m = document.createElement('div');
                m.className = 'fixed inset-0 z-50 flex items-center justify-center';
                m.innerHTML = `<div class="absolute inset-0 bg-black/70" onclick="m.remove()"></div>
                    <div class="relative z-10 bg-white p-6 rounded-xl w-full max-w-md">
                        <h3 class="text-xl font-bold mb-4">网站存储地</h3>
                        <input id="n" placeholder="名称" class="w-full border p-2 rounded mb-2">
                        <input id="u" placeholder="网址" class="w-full border p-2 rounded mb-2">
                        <button id="a" class="bg-blue-600 text-white px-4 py-2 rounded w-full">添加</button>
                        <div class="mt-4 max-h-60 overflow-y-auto"></div>
                    </div>`;
                document.body.appendChild(m);
                
                const list = m.querySelector('.mt-4');
                globalData.websites.forEach((w,i) => {
                    const it = document.createElement('div');
                    it.className = 'flex justify-between p-2 border-b';
                    it.innerHTML = `<div><p class="font-medium">${w.name}</p><a href="${w.url}" target="_blank" class="text-blue-600 text-sm">打开</a></div>
                        <button class="del text-red-500">删</button>`;
                    it.querySelector('.del').onclick = async () => {
                        globalData.websites.splice(i,1);
                        await saveCloudData();
                        m.remove();
                    };
                    list.appendChild(it);
                });
                
                m.querySelector('#a').onclick = async () => {
                    const n = m.querySelector('#n').value;
                    const u = m.querySelector('#u').value;
                    if (n&&u) {
                        globalData.websites.push({name:n, url:u});
                        await saveCloudData();
                        m.remove();
                    }
                };
            };

            // 悄悄话
            document.getElementById('secret-chat').onclick = () => {
                const m = document.createElement('div');
                m.className = 'fixed inset-0 z-50 flex items-center justify-center';
                m.innerHTML = `<div class="absolute inset-0 bg-black/70" onclick="m.remove()"></div>
                    <div class="relative z-10 bg-white p-6 rounded-xl w-full max-w-md h-[70vh] flex flex-col">
                        <h3 class="text-xl font-bold mb-2">悄悄话</h3>
                        <div class="flex-1 overflow-y-auto bg-gray-50 p-3 rounded mb-3"></div>
                        <input id="msg" class="border p-2 rounded flex-1 mr-2" placeholder="输入消息">
                        <button id="send" class="bg-blue-600 text-white px-4 py-2 rounded">发送</button>
                    </div>`;
                document.body.appendChild(m);
                const box = m.querySelector('.flex-1');
                globalData.messages.forEach(txt => {
                    const d = document.createElement('div');
                    d.className = 'p-2 rounded bg-blue-100 my-1 w-fit';
                    d.textContent = txt;
                    box.appendChild(d);
                });
                m.querySelector('#send').onclick = async () => {
                    const t = m.querySelector('#msg').value.trim();
                    if (t) {
                        globalData.messages.push(t);
                        await saveCloudData();
                        const d = document.createElement('div');
                        d.className = 'p-2 rounded bg-blue-100 my-1 w-fit';
                        d.textContent = t;
                        box.appendChild(d);
                        m.querySelector('#msg').value = '';
                    }
                };
            };

            // 实验区
            document.getElementById('experiment-area').onclick = () => alert('功能开发中');
        });
    </script>
</body>
</html>
    </script>
</body>
