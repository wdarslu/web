<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共享小屋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF7A00',
                        secondary: '#0066CC',
                        dark: '#333333',
                        light: '#FFFFFF'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            }
            .transition-all-300 {
                transition: all 0.3s ease;
            }
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }

        /* 鼠标尾迹星星样式 */
        .star-trail {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            color: #FFD700;
            font-size: 16px;
            opacity: 0.6;
            animation: fadeOut 1.5s ease-out forwards;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1) rotate(0deg); }
            100% { opacity: 0; transform: scale(0.5) rotate(360deg); }
        }

        /* Netlify 登录按钮 */
        #netlify-login-btn {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            background: #0066CC;
            color: white;
            padding: 10px 20px;
            border-radius: 9999px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(0,102,204,0.3);
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body class="bg-gray-100">

<button id="netlify-login-btn">Netlify 登录</button>

<!-- 欢迎页面 -->
<div id="welcome-page" class="min-h-screen flex flex-col">
    <div class="hero-section flex-1 flex flex-col md:flex-row">
        <div class="w-full md:w-1/2 flex items-center justify-center p-8">
            <div class="text-center md:text-left px-4" data-aos="fade-right">
                <h1 class="text-[clamp(1.8rem,5vw,3rem)] font-bold text-dark mb-8 bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-blue-400">欢迎来到共享小屋</h1>
                <div class="flex justify-center">
                    <button id="login-btn" class="bg-blue-600 text-white font-semibold py-3 px-8 rounded-full text-lg">
                        登录
                    </button>
                </div>
            </div>
        </div>
        <div class="w-full md:w-1/2 flex items-center justify-center p-4">
            <div data-aos="fade-left">
                <img src="https://p3-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/32c68defa39e4766bfd999113db11050.png" alt="欢迎图片" class="max-w-full max-h-[80vh] object-contain">
            </div>
        </div>
    </div>
</div>

<!-- 登录页面 -->
<div id="login-page" class="min-h-screen flex hidden">
    <div class="w-full md:w-1/2 flex items-center justify-center p-8 bg-white">
        <div class="w-full max-w-md" data-aos="fade-right">
            <h2 class="text-3xl font-bold text-dark mb-6">账号登录</h2>
            <form id="login-form" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">账号</label>
                    <input type="text" id="username" class="w-full px-4 py-3 border border-gray-300 rounded-lg" placeholder="请输入账号" required>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" id="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg" placeholder="请输入密码" required>
                </div>
                <div id="error-message" class="hidden bg-red-50 text-red-500 p-3 rounded-lg text-sm"></div>
                <button type="submit" class="bg-blue-600 w-full text-white font-semibold py-3 rounded-lg text-lg">登录</button>
            </form>
        </div>
    </div>
</div>

<!-- 验证弹窗 -->
<div id="verification-modal" class="fixed inset-0 flex items-center justify-center z-50 hidden">
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="bg-white rounded-xl p-8 max-w-md w-full text-center relative z-10">
        <h3 class="text-2xl font-bold mb-6">请完成验证</h3>
        <div class="text-3xl font-bold text-blue-600 mb-6">
            <span id="num1">5</span> + <span id="num2">3</span> = ?
        </div>
        <input type="number" id="verification-answer" class="w-full px-4 py-3 border rounded-lg mb-6" placeholder="输入答案">
        <div id="verification-error" class="hidden text-red-500 mb-4"></div>
        <button id="verify-btn" class="bg-blue-600 text-white px-6 py-3 rounded-lg">验证</button>
    </div>
</div>

<!-- 成功页面 -->
<div id="success-page" class="min-h-screen hidden">
    <div class="p-8 text-center">
        <h1 class="text-5xl font-bold text-blue-600">锦鲤的大海</h1>
        <p class="mt-4 text-xl">人生是大海，不是鱼塘</p>
        <button id="logout-btn" class="mt-8 bg-red-600 text-white px-6 py-3 rounded-lg">退出登录</button>
    </div>
</div>

<script>
// ==========================
// 鼠标尾迹星星（已修复）
// ==========================
const starSymbols = ['★', '☆', '✦', '✧', '✫', '✬'];
let mouseX = 0, mouseY = 0;
let trailInterval = null;
let mouseTimeout;

document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    if (!trailInterval) trailInterval = setInterval(createStar, 30);
    clearTimeout(mouseTimeout);
    mouseTimeout = setTimeout(() => { clearInterval(trailInterval); trailInterval = null; }, 30);
});

function createStar() {
    const star = document.createElement('div');
    star.className = 'star-trail';
    star.textContent = starSymbols[Math.floor(Math.random() * starSymbols.length)];
    const size = Math.random() * 10 + 20;
    star.style.fontSize = size + 'px';
    star.style.left = mouseX + 'px';
    star.style.top = mouseY + 'px';
    document.body.appendChild(star);
    setTimeout(() => star.remove(), 1500);
}

// ==========================
// 页面切换逻辑（100%可点）
// ==========================
const welcomePage = document.getElementById('welcome-page');
const loginPage = document.getElementById('login-page');
const successPage = document.getElementById('success-page');
const loginBtn = document.getElementById('login-btn');
const loginForm = document.getElementById('login-form');
const errorMessage = document.getElementById('error-message');
const verificationModal = document.getElementById('verification-modal');
const verifyBtn = document.getElementById('verify-btn');
const logoutBtn = document.getElementById('logout-btn');
const netlifyLoginBtn = document.getElementById('netlify-login-btn');

// 欢迎页登录按钮 → 跳登录页（已修复！）
loginBtn.addEventListener('click', () => {
    welcomePage.classList.add('hidden');
    loginPage.classList.remove('hidden');
    loginPage.classList.add('flex');
});

// 登录表单
loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pwd = document.getElementById('password').value;
    if (user === 'clzandly' && pwd === '005216') {
        verificationModal.classList.remove('hidden');
        errorMessage.classList.add('hidden');
    } else {
        errorMessage.textContent = '账号或密码错误';
        errorMessage.classList.remove('hidden');
    }
});

// 验证
verifyBtn.addEventListener('click', () => {
    const ans = parseInt(document.getElementById('verification-answer').value);
    if (ans === 8) {
        verificationModal.classList.add('hidden');
        loginPage.classList.add('hidden');
        successPage.classList.remove('hidden');
        netlifyLoginBtn.style.display = "block";
    } else {
        document.getElementById('verification-error').classList.remove('hidden');
    }
});

// 退出
logoutBtn.addEventListener('click', () => {
    successPage.classList.add('hidden');
    welcomePage.classList.remove('hidden');
    netlifyLoginBtn.style.display = "none";
});

// Netlify 登录
netlifyLoginBtn.addEventListener('click', () => {
    netlifyIdentity.open();
});

netlifyIdentity.init();
AOS.init();
</script>
</body>
</html>
