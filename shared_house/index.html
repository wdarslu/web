<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共享小屋</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- AOS 动画库 -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF7A00',
                        secondary: '#0066CC',
                        dark: '#333333',
                        light: '#FFFFFF'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            }
            .transition-all-300 {
                transition: all 0.3s ease;
            }
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .hero-section {
            background-color: #FFFFFF;
        }
        
        .login-section {
            background-color: #FFFFFF;
        }
        
        .form-input {
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            border-color: #0066CC;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.2);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #0066CC 0%, #0080FF 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 102, 204, 0.3);
        }
        
        .btn-secondary {
            background-color: transparent;
            border: 2px solid #FFFFFF;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        /* 鼠标尾迹星星样式 */
        .star-trail {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            color: #FFD700;
            font-size: 16px;
            opacity: 0.6;
            animation: fadeOut 1.5s ease-out forwards;
        }
        
        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: scale(0.5) rotate(360deg);
            }
        }
    </style>
</head>

    <script>
        // 初始化AOS动画库
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init();
            
            // 鼠标尾迹效果
            const starSymbols = ['★', '☆', '✦', '✧', '✫', '✬'];
            let mouseX = 0, mouseY = 0;
            let trailInterval;
            
            // 监听鼠标移动
            document.addEventListener('mousemove', function(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
                
                // 如果没有活动的定时器，则创建新的定时器
                if (!trailInterval) {
                    trailInterval = setInterval(createStar, 30);
                }
            });
            
            // 监听鼠标停止移动
            let mouseTimeout;
            document.addEventListener('mousemove', function() {
                // 清除之前的超时定时器
                clearTimeout(mouseTimeout);
                
                // 设置新的超时定时器，30毫秒后如果没有新的鼠标移动，则停止生成星星
                mouseTimeout = setTimeout(function() {
                    if (trailInterval) {
                        clearInterval(trailInterval);
                        trailInterval = null;
                    }
                }, 30);
            });
            
            // 创建星星元素
            function createStar() {
                const star = document.createElement('div');
                star.className = 'star-trail';
                star.textContent = starSymbols[Math.floor(Math.random() * starSymbols.length)];
                
                // 随机大小
                const size = Math.floor(Math.random() * 10) + 20;
                star.style.fontSize = size + 'px';
                
                // 随机颜色 - 使用HSL颜色空间生成更丰富的随机颜色
                const hue = Math.floor(Math.random() * 360); // 0-360的色相值
                const saturation = Math.floor(Math.random() * 50) + 50; // 50-100的饱和度
                const lightness = Math.floor(Math.random() * 30) + 60; // 60-90的亮度
                star.style.color = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
                
                // 定位到鼠标位置
                star.style.left = mouseX + 'px';
                star.style.top = mouseY + 'px';
                
                // 添加到文档中
                document.body.appendChild(star);
                
                // 动画结束后移除元素
                setTimeout(() => {
                    star.remove();
                }, 1500);
            }
            
            // 鼠标停止移动时停止生成星星
            document.addEventListener('mouseleave', function() {
                if (trailInterval) {
                    clearInterval(trailInterval);
                }
            });
            
            const welcomePage = document.getElementById('welcome-page');
            const loginPage = document.getElementById('login-page');
            const successPage = document.getElementById('success-page');
            const loginBtn = document.getElementById('login-btn');
            const backBtn = document.getElementById('back-btn');
            const logoutBtn = document.getElementById('logout-btn');
            const loginForm = document.getElementById('login-form');
            const errorMessage = document.getElementById('error-message');
            
            // 数字验证相关变量
            let num1, num2, correctAnswer;
            
            // 生成随机数字验证题
            function generateVerification() {
                num1 = Math.floor(Math.random() * 50) + 1; // 1-50的随机数
                num2 = Math.floor(Math.random() * 50) + 1; // 1-50的随机数
                correctAnswer = num1 + num2;
                
                document.getElementById('num1').textContent = num1;
                document.getElementById('num2').textContent = num2;
                document.getElementById('verification-answer').value = '';
                document.getElementById('verification-error').classList.add('hidden');
            }
            
            // 显示数字验证弹窗
            function showVerificationModal() {
                generateVerification();
                document.getElementById('verification-modal').classList.remove('hidden');
            }
            
            // 隐藏数字验证弹窗
            function hideVerificationModal() {
                document.getElementById('verification-modal').classList.add('hidden');
            }
            
            // 点击欢迎页面的登录按钮，直接跳转到登录页面
            loginBtn.addEventListener('click', function() {
                welcomePage.classList.add('hidden');
                loginPage.classList.remove('hidden');
                loginPage.classList.add('flex');
            });
            
            // 点击返回按钮，回到欢迎页面
            backBtn.addEventListener('click', function() {
                loginPage.classList.add('hidden');
                loginPage.classList.remove('flex');
                welcomePage.classList.remove('hidden');
                errorMessage.classList.add('hidden');
                loginForm.reset();
            });
            
            // 点击取消验证按钮，关闭弹窗
            document.getElementById('cancel-verification').addEventListener('click', function() {
                hideVerificationModal();
            });
            
            // 点击弹窗背景，关闭弹窗
            document.getElementById('modal-overlay').addEventListener('click', function() {
                hideVerificationModal();
            });
            
            // 验证按钮点击事件
            document.getElementById('verify-btn').addEventListener('click', function() {
                const userAnswer = parseInt(document.getElementById('verification-answer').value);
                const errorElement = document.getElementById('verification-error');
                
                if (isNaN(userAnswer)) {
                    errorElement.textContent = '请输入有效的数字';
                    errorElement.classList.remove('hidden');
                    return;
                }
                
                if (userAnswer === correctAnswer) {
                    // 验证成功，跳转到成功页面
                    hideVerificationModal();
                    loginPage.classList.add('hidden');
                    loginPage.classList.remove('flex');
                    successPage.classList.remove('hidden');
                } else {
                    // 验证失败，显示错误信息
                    errorElement.textContent = '答案错误，请重新计算';
                    errorElement.classList.remove('hidden');
                }
            });
            
            // 点击退出登录按钮，回到欢迎页面
            logoutBtn.addEventListener('click', function() {
                successPage.classList.add('hidden');
                welcomePage.classList.remove('hidden');
            });
            
            // 忘记密码相关功能
            const forgotPasswordLink = document.getElementById('forgot-password');
            const confirmModal = document.getElementById('confirm-modal');
            const phoneModal = document.getElementById('phone-modal');
            const confirmBtn = document.getElementById('confirm-btn');
            const cancelBtn = document.getElementById('cancel-btn');
            const confirmOverlay = document.getElementById('confirm-overlay');
            const phoneOverlay = document.getElementById('phone-overlay');
            const countdownElement = document.getElementById('countdown');
            let countdownTimer;
            
            // 显示确认弹窗
            forgotPasswordLink.addEventListener('click', function(e) {
                e.preventDefault();
                confirmModal.classList.remove('hidden');
            });
            
            // 点击确认按钮，显示电话号码弹窗
            confirmBtn.addEventListener('click', function() {
                confirmModal.classList.add('hidden');
                showPhoneModal();
            });
            
            // 点击取消按钮或弹窗背景，关闭确认弹窗
            cancelBtn.addEventListener('click', function() {
                confirmModal.classList.add('hidden');
            });
            
            confirmOverlay.addEventListener('click', function() {
                confirmModal.classList.add('hidden');
            });
            
            // 显示电话号码弹窗并开始倒计时
            function showPhoneModal() {
                phoneModal.classList.remove('hidden');
                let countdown = 10;
                countdownElement.textContent = countdown;
                
                countdownTimer = setInterval(function() {
                    countdown--;
                    countdownElement.textContent = countdown;
                    
                    if (countdown <= 0) {
                        clearInterval(countdownTimer);
                        phoneModal.classList.add('hidden');
                    }
                }, 1000);
            }
            
            // 点击弹窗背景，关闭电话号码弹窗
            phoneOverlay.addEventListener('click', function() {
                clearInterval(countdownTimer);
                phoneModal.classList.add('hidden');
            });
            
            // 登录表单提交
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                // 验证账号密码
                if (username === 'clzandly' && password === '005216') {
                    // 账号密码正确，显示数字验证弹窗
                    showVerificationModal();
                    errorMessage.classList.add('hidden');
                } else {
                    // 登录失败，显示错误信息
                    errorMessage.textContent = '账号或密码错误，请重新输入';
                    errorMessage.classList.remove('hidden');
                }
            });
            
            // 相册功能 - 使用localStorage存储照片数据
            let photos = JSON.parse(localStorage.getItem('albumPhotos')) || [
                'https://p9-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/6a6821d2c6764015a65911a926558c9a.png~tplv-a9rns2rl98-24:720:720.png?lk3s=8e244e95&rcl=202604091001340F1BAFC1BF49490A439B&rrcfp=8a172a1a&x-expires=1776304895&x-signature=qD54%2Bj0B%2B0B%2B8B%2F1B%2F2B%2F3B%2F4B%2F5B%2F6B%2F7B%2F8B%2F9B%2FA',
                'https://p3-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/32c68defa39e4766bfd999113db11050.png~tplv-a9rns2rl98-24:720:720.png?lk3s=8e244e95&rcl=202604091001340F1BAFC1BF49490A439B&rrcfp=8a172a1a&x-expires=1776304894&x-signature=RaHIgQDRfZ%2BF0ij7saidCxiBtg0%3D',
                'https://p26-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/e882f01bc6214478b16c4b6e864ca02a.jpg~tplv-a9rns2rl98-24:720:720.jpg?lk3s=8e244e95&rcl=20260409174732BC1671B1F0D173F65511&rrcfp=8a172a1a&x-expires=1776332852&x-signature=E4JQXLW0M9wrWkD4JuiZvg176uM%3D'
            ];
            
            // 保存照片数据到localStorage
            function savePhotos() {
                localStorage.setItem('albumPhotos', JSON.stringify(photos));
            }
            
            const albumGrid = document.querySelector('#album .grid');
            
            // 渲染照片
            function renderPhotos() {
                albumGrid.innerHTML = '';
                
                // 只显示前4张照片
                const displayPhotos = photos.slice(0, 4);
                
                displayPhotos.forEach((photo, index) => {
                    const photoElement = document.createElement('div');
                    photoElement.className = 'relative bg-white/10 backdrop-blur-sm rounded-lg overflow-hidden aspect-square';
                    photoElement.draggable = true;
                    photoElement.dataset.index = index;
                    
                    photoElement.innerHTML = `
                        <img src="${photo}" alt="照片 ${index + 1}" class="w-full h-full object-contain">
                        <div class="absolute inset-0 bg-black/0 hover:bg-black/30 transition-colors flex items-center justify-center opacity-0 hover:opacity-100">
                            <button class="delete-photo-btn text-white bg-red-500/80 hover:bg-red-600 px-3 py-1 rounded-full mr-2">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>
                    `;
                    
                    // 添加拖拽事件
                    photoElement.addEventListener('dragstart', handleDragStart);
                    photoElement.addEventListener('dragover', handleDragOver);
                    photoElement.addEventListener('drop', handleDrop);
                    
                    // 添加删除事件
                    photoElement.querySelector('.delete-photo-btn').addEventListener('click', () => {
                        deletePhoto(index);
                    });
                    
                    albumGrid.appendChild(photoElement);
                });
                
                // 添加照片按钮
                const addPhotoBtn = document.createElement('div');
                addPhotoBtn.className = 'bg-white/20 backdrop-blur-sm rounded-lg flex items-center justify-center aspect-square cursor-pointer hover:bg-white/30 transition-colors';
                addPhotoBtn.innerHTML = `
                    <div class="text-center text-white">
                        <i class="fa fa-plus text-4xl mb-2"></i>
                        <p>添加照片</p>
                    </div>
                `;
                
                // 添加点击事件
                addPhotoBtn.addEventListener('click', function() {
                    // 创建相册弹窗
                    const modal = document.createElement('div');
                    modal.className = 'fixed inset-0 flex items-center justify-center z-50';
                    modal.innerHTML = `
                        <div class="absolute inset-0 bg-black/70" id="album-modal-overlay"></div>
                        <div class="relative z-10 bg-white rounded-xl shadow-xl p-6 max-w-4xl w-full max-h-[80vh] overflow-y-auto">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-2xl font-bold">相册管理</h3>
                                <button id="close-album-modal" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
                            </div>
                            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 mb-6">
                                ${photos.map((photo, index) => `
                                    <div class="relative bg-gray-100 rounded-lg overflow-hidden aspect-square">
                                        <img src="${photo}" alt="照片 ${index + 1}" class="w-full h-full object-cover">
                                        <button class="absolute top-2 right-2 delete-photo-btn-modal text-white bg-red-500/80 hover:bg-red-600 p-2 rounded-full">
                                            <i class="fa fa-trash"></i>
                                        </button>
                                    </div>
                                `).join('')}
                                <div class="bg-gray-100 rounded-lg flex items-center justify-center aspect-square cursor-pointer hover:bg-gray-200" id="add-new-photo">
                                    <div class="text-center">
                                        <i class="fa fa-plus text-4xl text-gray-400 mb-2"></i>
                                        <p class="text-gray-500">添加照片</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    document.body.appendChild(modal);
                    
                    // 关闭弹窗
                    document.getElementById('album-modal-overlay').addEventListener('click', function() {
                        modal.remove();
                    });
                    
                    document.getElementById('close-album-modal').addEventListener('click', function() {
                        modal.remove();
                    });
                    
                    // 删除照片
                    modal.querySelectorAll('.delete-photo-btn-modal').forEach((btn, index) => {
                        btn.addEventListener('click', function() {
                            photos.splice(index, 1);
                            modal.remove();
                            renderPhotos();
                        });
                    });
                    
                    // 添加新照片
                    document.getElementById('add-new-photo').addEventListener('click', function() {
                        const input = document.createElement('input');
                        input.type = 'file';
                        input.accept = 'image/*';
                        input.onchange = function(e) {
                            const file = e.target.files[0];
                            if (file) {
                                const reader = new FileReader();
                                reader.onload = function(e) {
                                    photos.push(e.target.result);
                                    savePhotos();
                                    renderPhotos();
                                    modal.remove();
                                };
                                reader.readAsDataURL(file);
                            }
                        };
                        input.click();
                    });
                });
                
                albumGrid.appendChild(addPhotoBtn);
            }
            
            // 拖拽开始
            let draggedIndex = null;
            function handleDragStart(e) {
                draggedIndex = parseInt(this.dataset.index);
                this.classList.add('opacity-50');
            }
            
            // 拖拽经过
            function handleDragOver(e) {
                e.preventDefault();
                this.classList.add('ring-2', 'ring-white');
            }
            
            // 拖拽释放
            function handleDrop(e) {
                e.preventDefault();
                this.classList.remove('ring-2', 'ring-white');
                const dropIndex = parseInt(this.dataset.index);
                
                if (draggedIndex !== dropIndex) {
                    // 调整照片顺序
                    const [draggedPhoto] = photos.splice(draggedIndex, 1);
                    photos.splice(dropIndex, 0, draggedPhoto);
                    savePhotos();
                    renderPhotos();
                }
            }
            
            // 删除照片
            function deletePhoto(index) {
                photos.splice(index, 1);
                savePhotos();
                renderPhotos();
            }
            

            
            // 初始渲染照片
            renderPhotos();
            
            // 平滑滚动到相册板块
            document.querySelector('a[href="#album"]').addEventListener('click', function(e) {
                e.preventDefault();
                document.getElementById('album').scrollIntoView({ behavior: 'smooth' });
            });
            
            // 平滑滚动到首页
            document.querySelector('a[href="#hero"]').addEventListener('click', function(e) {
                e.preventDefault();
                document.getElementById('hero').scrollIntoView({ behavior: 'smooth' });
            });
            
            // 平滑滚动到资料存储地
            document.querySelector('a[href="#storage"]').addEventListener('click', function(e) {
                e.preventDefault();
                document.getElementById('storage').scrollIntoView({ behavior: 'smooth' });
            });
            
            // 资料存储地功能
            
            // 1. 网站存储地
            const websites = JSON.parse(localStorage.getItem('websites')) || [];
            
            function saveWebsites() {
                localStorage.setItem('websites', JSON.stringify(websites));
            }
            
            document.getElementById('website-storage').addEventListener('click', function() {
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 flex items-center justify-center z-50';
                modal.innerHTML = `
                    <div class="absolute inset-0 bg-black/70" id="website-modal-overlay"></div>
                    <div class="relative z-10 bg-white rounded-xl shadow-xl p-6 max-w-4xl w-full max-h-[80vh] overflow-y-auto">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-2xl font-bold">网站存储地</h3>
                            <button id="close-website-modal" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
                        </div>
                        <div class="mb-6">
                            <input type="text" id="website-name" placeholder="网站名称" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-2">
                            <input type="url" id="website-url" placeholder="网站地址" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                            <button id="add-website" class="mt-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">添加网站</button>
                        </div>
                        <div id="websites-list" class="space-y-2">
                            ${websites.map((website, index) => `
                                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                    <div>
                                        <h4 class="font-medium">${website.name}</h4>
                                        <a href="${website.url}" target="_blank" class="text-blue-600 text-sm">${website.url}</a>
                                    </div>
                                    <button class="delete-website text-red-500 hover:text-red-700" data-index="${index}">
                                        <i class="fa fa-trash"></i>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                
                document.body.appendChild(modal);
                
                // 关闭弹窗
                document.getElementById('website-modal-overlay').addEventListener('click', function() {
                    modal.remove();
                });
                
                document.getElementById('close-website-modal').addEventListener('click', function() {
                    modal.remove();
                });
                
                // 添加网站
                document.getElementById('add-website').addEventListener('click', function() {
                    const name = document.getElementById('website-name').value;
                    const url = document.getElementById('website-url').value;
                    
                    if (name && url) {
                        websites.push({ name, url });
                        saveWebsites();
                        
                        // 重新渲染网站列表
                        const websitesList = document.getElementById('websites-list');
                        websitesList.innerHTML += `
                            <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                <div>
                                    <h4 class="font-medium">${name}</h4>
                                    <a href="${url}" target="_blank" class="text-blue-600 text-sm">${url}</a>
                                </div>
                                <button class="delete-website text-red-500 hover:text-red-700" data-index="${websites.length - 1}">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </div>
                        `;
                        
                        // 清空输入框
                        document.getElementById('website-name').value = '';
                        document.getElementById('website-url').value = '';
                    }
                });
                
                // 删除网站
                modal.querySelectorAll('.delete-website').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const index = parseInt(this.dataset.index);
                        websites.splice(index, 1);
                        saveWebsites();
                        this.closest('div').remove();
                    });
                });
            });
            
            // 2. 悄悄话专区
            const messages = JSON.parse(localStorage.getItem('messages')) || [];
            
            function saveMessages() {
                localStorage.setItem('messages', JSON.stringify(messages));
            }
            
            document.getElementById('secret-chat').addEventListener('click', function() {
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 flex items-center justify-center z-50';
                modal.innerHTML = `
                    <div class="absolute inset-0 bg-black/70" id="chat-modal-overlay"></div>
                    <div class="relative z-10 bg-white rounded-xl shadow-xl p-6 max-w-2xl w-full max-h-[80vh] flex flex-col">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-2xl font-bold">悄悄话专区</h3>
                            <button id="close-chat-modal" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
                        </div>
                        <div id="chat-messages" class="flex-1 overflow-y-auto mb-4 space-y-4 p-4 bg-gray-50 rounded-lg">
                            ${messages.map((msg, index) => `
                                <div class="flex ${index % 2 === 0 ? 'justify-start' : 'justify-end'}">
                                    <div class="max-w-[70%] p-3 rounded-lg ${index % 2 === 0 ? 'bg-blue-100' : 'bg-green-100'}">
                                        ${msg}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="flex">
                            <input type="text" id="chat-input" placeholder="输入消息..." class="flex-1 px-4 py-2 border border-gray-300 rounded-l-lg">
                            <button id="send-message" class="bg-blue-600 text-white px-4 py-2 rounded-r-lg hover:bg-blue-700">发送</button>
                        </div>
                    </div>
                `;
                
                document.body.appendChild(modal);
                
                // 关闭弹窗
                document.getElementById('chat-modal-overlay').addEventListener('click', function() {
                    modal.remove();
                });
                
                document.getElementById('close-chat-modal').addEventListener('click', function() {
                    modal.remove();
                });
                
                // 发送消息
                document.getElementById('send-message').addEventListener('click', function() {
                    const input = document.getElementById('chat-input');
                    const message = input.value.trim();
                    
                    if (message) {
                        messages.push(message);
                        saveMessages();
                        
                        const chatMessages = document.getElementById('chat-messages');
                        const isEven = messages.length % 2 === 0;
                        
                        chatMessages.innerHTML += `
                            <div class="flex ${isEven ? 'justify-end' : 'justify-start'}">
                                <div class="max-w-[70%] p-3 rounded-lg ${isEven ? 'bg-green-100' : 'bg-blue-100'}">
                                    ${message}
                                </div>
                            </div>
                        `;
                        
                        // 滚动到底部
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                        
                        // 清空输入框
                        input.value = '';
                    }
                });
                
                // 回车键发送
                document.getElementById('chat-input').addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        document.getElementById('send-message').click();
                    }
                });
                
                // 滚动到底部
                const chatMessages = document.getElementById('chat-messages');
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
            
            // 3. 实验区
            document.getElementById('experiment-area').addEventListener('click', function() {
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 flex items-center justify-center z-50';
                modal.innerHTML = `
                    <div class="absolute inset-0 bg-black/70" id="experiment-modal-overlay"></div>
                    <div class="relative z-10 bg-white rounded-xl shadow-xl p-8 max-w-md w-full text-center">
                        <h3 class="text-3xl font-bold mb-4">实验区</h3>
                        <p class="text-lg text-gray-600 mb-8">该功能暂未开放，请返回</p>
                        <button id="close-experiment-modal" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors">
                            返回
                        </button>
                    </div>
                `;
                
                document.body.appendChild(modal);
                
                // 关闭弹窗
                document.getElementById('experiment-modal-overlay').addEventListener('click', function() {
                    modal.remove();
                });
                
                document.getElementById('close-experiment-modal').addEventListener('click', function() {
                    modal.remove();
                });
            });
        });
    </script>
</body>
</html>
